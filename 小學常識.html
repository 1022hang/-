<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學常識科 10 題挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f9ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .quiz-container {
            max-width: 700px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .option-btn {
            transition: all 0.2s;
            text-align: left;
            width: 100%;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
        }
        .option-btn:hover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .option-btn.selected {
            border-color: #3b82f6;
            background-color: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="setup-screen" class="text-center">
        <h1 class="text-3xl font-bold text-blue-600 mb-4">小學常識科測試</h1>
        <p class="text-gray-600 mb-6">準備好挑戰 10 道有趣的常識題嗎？</p>
        <button onclick="startQuiz()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition">開始測試</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <span id="question-number" class="text-blue-600 font-bold">問題 1 / 10</span>
            <div class="h-2 w-32 bg-gray-200 rounded">
                <div id="progress-bar" class="h-2 bg-blue-500 rounded" style="width: 10%"></div>
            </div>
        </div>
        
        <h2 id="question-text" class="text-xl font-semibold mb-6 text-gray-800"></h2>
        
        <div id="options-container" class="space-y-3">
            <!-- Options will be injected here -->
        </div>

        <div class="mt-8 flex justify-end">
            <button id="next-btn" onclick="handleNext()" class="hidden bg-green-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-600">下一題</button>
        </div>
    </div>

    <div id="result-screen" class="hidden text-center">
        <h2 class="text-3xl font-bold text-gray-800 mb-4">測試完成！</h2>
        <div class="text-6xl font-black text-blue-600 mb-4" id="final-score">0 / 10</div>
        <p id="feedback-text" class="text-lg text-gray-600 mb-8"></p>
        <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700">重新挑戰</button>
    </div>
</div>

<script>
    const quizData = [
        {
            question: "下列哪一個是香港特別行政區的區花？",
            options: ["牡丹", "紫荊花", "蓮花", "玫瑰"],
            correct: 1
        },
        {
            question: "水的沸點是多少攝氏度？",
            options: ["0度", "50度", "100度", "200度"],
            correct: 2
        },
        {
            question: "太陽從哪個方向升起？",
            options: ["東方", "南方", "西方", "北方"],
            correct: 0
        },
        {
            question: "人體最大的器官是什麼？",
            options: ["心臟", "大腦", "皮膚", "肝臟"],
            correct: 2
        },
        {
            question: "下列哪一種動物是哺乳類動物？",
            options: ["企鵝", "海豚", "金魚", "蝴蝶"],
            correct: 1
        },
        {
            question: "地球大氣中含量最多的氣體是？",
            options: ["氧氣", "二氧化碳", "氮氣", "氫氣"],
            correct: 2
        },
        {
            question: "下列哪一項是可再生能源？",
            options: ["石油", "煤炭", "太陽能", "天然氣"],
            correct: 2
        },
        {
            question: "一年之中，哪一個月通常只有28天或29天？",
            options: ["一月", "二月", "八月", "十二月"],
            correct: 1
        },
        {
            question: "急救電話在香港應該撥打？",
            options: ["110", "119", "999", "120"],
            correct: 2
        },
        {
            question: "彩虹由幾種顏色組成？",
            options: ["5種", "6種", "7種", "8種"],
            correct: 2
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let selectedOption = null;

    function startQuiz() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizData[currentQuestion];
        document.getElementById('question-number').innerText = `問題 ${currentQuestion + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = q.question;
        document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / quizData.length) * 100}%`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(index);
            container.appendChild(btn);
        });
        
        document.getElementById('next-btn').classList.add('hidden');
        selectedOption = null;
    }

    function selectOption(index) {
        selectedOption = index;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
        });
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function handleNext() {
        if (selectedOption === quizData[currentQuestion].correct) {
            score++;
        }
        
        currentQuestion++;
        
        if (currentQuestion < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        
        let feedback = "";
        if (score === 10) feedback = "太棒了！你是常識小博士！";
        else if (score >= 7) feedback = "做得好！你對常識很了解。";
        else if (score >= 5) feedback = "及格了，再加把勁閱讀更多書本吧！";
        else feedback = "加油！多觀察身邊的事物，下次會更好。";
        
        document.getElementById('feedback-text').innerText = feedback;
    }
</script>

</body>
</html>
